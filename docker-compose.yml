services:
  postgres:
    image: postgres:16
    container_name: greenculture-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: greenculture
      POSTGRES_USER: greenculture
      POSTGRES_PASSWORD: greenculture
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - greenculture_pgdata:/var/lib/postgresql/data

volumes:
  greenculture_pgdata:

