spring.application.name=greenculture

# --- DB (PostgreSQL) ---
# 로컬 개발 기본값: docker-compose의 postgres와 연동
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/greenculture}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:greenculture}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:greenculture}

# --- JPA ---
# 개발 중에는 update 추천 (운영/제출 시 validate + migration 권장)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# SQL 확인(필요 시 true)
spring.jpa.show-sql=false

# --- Seoul OpenAPI ---
# e.g. set env var: SEOUL_OPENAPI_KEY=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
seoul.openapi.key=${SEOUL_OPENAPI_KEY:}

# --- Seoul OpenAPI import scheduler ---
seoul.import.enabled=${SEOUL_IMPORT_ENABLED:false}
seoul.import.cron=${SEOUL_IMPORT_CRON:0 0 3 * * *}
seoul.import.pageSize=${SEOUL_IMPORT_PAGE_SIZE:200}
seoul.import.maxItems=${SEOUL_IMPORT_MAX_ITEMS:1000}
